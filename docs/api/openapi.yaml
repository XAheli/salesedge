openapi: "3.0.3"
info:
  title: SalesEdge API
  description: |
    Intelligent Sales & Revenue Operations Platform API.

    The full interactive spec is auto-generated by FastAPI at runtime.
    Visit `/docs` (Swagger UI) or `/redoc` (ReDoc) when the server is running.

    This file is a minimal stub that documents the base URL and points consumers
    to the runtime-generated spec.
  version: "1.0.0"
  contact:
    name: SalesEdge Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.salesedge.example.com
    description: Production

paths:
  /openapi.json:
    get:
      summary: Full OpenAPI spec (auto-generated)
      description: |
        FastAPI generates the complete OpenAPI 3.1 spec at runtime.
        Fetch this endpoint to get the full schema with all models.
      responses:
        "200":
          description: OpenAPI JSON document

  /api/v1/health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  database:
                    type: string
                    example: connected
                  redis:
                    type: string
                    example: connected

  /api/v1/dashboard/kpis:
    get:
      summary: Dashboard KPI summary
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: KPI metrics for the executive cockpit

  /api/v1/prospects:
    get:
      summary: List prospects
      tags: [Prospects]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: sector
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of prospects with fit scores

  /api/v1/deals:
    get:
      summary: List deals
      tags: [Deals]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Deals grouped by risk level

  /api/v1/agents/chat:
    post:
      summary: Chat with AI agents
      tags: [Agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                agent:
                  type: string
                  enum: [prospect, deal_intel, retention, competitive]
      responses:
        "200":
          description: Agent response with analysis and suggested actions

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
