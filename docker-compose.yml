# SalesEdge — full local development stack (API, UI, Postgres, Redis)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salesedge
      POSTGRES_USER: salesedge
      POSTGRES_PASSWORD: ${SE_DB_PASSWORD:-salesedge_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesedge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - salesedge

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - salesedge

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SE_DATABASE_URL: postgresql://salesedge:${SE_DB_PASSWORD:-salesedge_dev}@postgres:5432/salesedge
      SE_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - salesedge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - salesedge

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  salesedge:
    driver: bridge
