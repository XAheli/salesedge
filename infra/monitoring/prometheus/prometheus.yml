global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # When Prometheus runs in Docker, use host.docker.internal (Mac/Windows) or
  # the compose service name `backend` instead of localhost.
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:8000
        labels:
          service: salesedge-api

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node
