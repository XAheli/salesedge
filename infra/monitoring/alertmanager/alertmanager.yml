global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@salesedge.example'
  # smtp_auth_username: 'alertmanager@example.com'
  # smtp_auth_password: 'REPLACE_ME'

route:
  receiver: default
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # email_configs:
    #   - to: 'oncall@salesedge.example'
    #     send_resolved: true
    #     headers:
    #       Subject: '[SalesEdge] {{ .GroupLabels.alertname }}'

  - name: 'null'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
