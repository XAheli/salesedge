apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesedge-redis
  namespace: salesedge
  labels:
    app: salesedge-redis
    app.kubernetes.io/name: salesedge-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salesedge-redis
  template:
    metadata:
      labels:
        app: salesedge-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          command: ["redis-server"]
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: salesedge-redis
  namespace: salesedge
  labels:
    app: salesedge-redis
spec:
  type: ClusterIP
  selector:
    app: salesedge-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
