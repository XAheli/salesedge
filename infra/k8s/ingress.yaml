apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: salesedge-ingress
  namespace: salesedge
  labels:
    app.kubernetes.io/name: salesedge-ingress
    app.kubernetes.io/part-of: salesedge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: salesedge-backend
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - salesedge.example.com
        - api.salesedge.example.com
      secretName: salesedge-tls
  rules:
    - host: salesedge.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: salesedge-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: salesedge-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: salesedge-frontend
                port:
                  number: 80
    - host: api.salesedge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: salesedge-backend
                port:
                  number: 8000
