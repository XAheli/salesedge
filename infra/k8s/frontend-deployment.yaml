apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesedge-frontend
  namespace: salesedge
  labels:
    app: salesedge-frontend
    app.kubernetes.io/name: salesedge-frontend
    app.kubernetes.io/component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salesedge-frontend
  template:
    metadata:
      labels:
        app: salesedge-frontend
    spec:
      containers:
        - name: frontend
          image: salesedge-frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: salesedge-frontend
  namespace: salesedge
  labels:
    app: salesedge-frontend
spec:
  type: ClusterIP
  selector:
    app: salesedge-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
