apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesedge-postgres
  namespace: salesedge
  labels:
    app: salesedge-postgres
    app.kubernetes.io/name: salesedge-postgres
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: salesedge-postgres
  template:
    metadata:
      labels:
        app: salesedge-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: salesedge
            - name: POSTGRES_USER
              value: salesedge
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: salesedge-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "salesedge"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "salesedge"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: salesedge-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: salesedge-postgres-pvc
  namespace: salesedge
  labels:
    app: salesedge-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: salesedge-postgres
  namespace: salesedge
  labels:
    app: salesedge-postgres
spec:
  type: ClusterIP
  selector:
    app: salesedge-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
