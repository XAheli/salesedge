# SalesEdge Redis Configuration
# Optimized for multi-tier caching workload

# ─── Memory ──────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ─── Persistence (RDB snapshots) ─────────────────────────────
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# ─── Append Only File (disabled for cache workload) ──────────
appendonly no

# ─── Networking ──────────────────────────────────────────────
bind 0.0.0.0
port 6379
tcp-keepalive 300
timeout 0

# ─── Performance ─────────────────────────────────────────────
databases 4
# db0: application cache (default)
# db1: test database
# db2: session store
# db3: reserved

# ─── Logging ─────────────────────────────────────────────────
loglevel notice

# ─── Security ────────────────────────────────────────────────
# Uncomment and set a password for production:
# requirepass your-redis-password-here

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""

# ─── Slow Log ────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
