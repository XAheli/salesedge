# SalesEdge — development override: Postgres + Redis only (run API/UI locally)
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salesedge
      POSTGRES_USER: salesedge
      POSTGRES_PASSWORD: ${SE_DB_PASSWORD:-salesedge_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesedge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - salesedge

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - salesedge

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  salesedge:
    driver: bridge
